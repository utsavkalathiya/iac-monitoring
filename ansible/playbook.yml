- name: Configure Monitoring Server Backend
  hosts: monitoring_servers
  become: true # Runs commands as 'sudo' (root)

  tasks:
    - name: Update apt repository cache
      apt:
        update_cache: yes
        force_apt_get: yes

    - name: Install required system packages
      apt:
        pkg:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker GPG apt Key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker Repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable
        state: present

    - name: Install Docker Engine & Compose Plugin
      apt:
        pkg:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is running and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Create monitoring directory on remote server
      file:
        path: /home/ubuntu/monitoring
        state: directory
        mode: "0755"

    - name: Copy deployment files to remote server
      copy:
        src: ../deployment/{{ item }}
        dest: /home/ubuntu/monitoring/{{ item }}
        mode: "0644"
      loop:
        - docker-compose.yml
        - prometheus.yml

    - name: Start Monitoring Stack via Docker Compose
      shell:
        cmd: docker compose up -d
        chdir: /home/ubuntu/monitoring
